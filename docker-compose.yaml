services:
  video_in:
    image: containers.openfilter.io/plainsightai/openfilter-video-inopenfilter-connector-gcs:2.0.4
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-connector-gcs:2.0.4}
      FILTER_ID: VideoIn
      FILTER_SOURCES: file:///video.mp4!sync!loop
      FILTER_OUTPUTS: tcp://*
    volumes:
      - ./data/sample_video.mp4:/video.mp4openfilter-connector-gcs:2.0.4

  gcs_connector_filter:
    image: containers.openfilter.io/plainsightai/openfilter-connector-gcs:2.0.4
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-connector-gcs:2.0.4}
      FILTER_ID: GCSConnectorFilter
      FILTER_SOURCES: tcp://video_in
      FILTER_OUTPUTS: gs://*
      FILTER_MQ_LOG: pretty

  webvis:
    image: containers.openfilter.io/plainsightai/openfilter-webvisopenfilter-connector-gcs:2.0.4
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-connector-gcs:2.0.4}
      FILTER_ID: Webvis
      FILTER_SOURCES: tcp://video_in
    ports:
      - 8001openfilter-connector-gcs:2.0.4